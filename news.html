<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Questio - News</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/quest.css">
  <link rel="icon" type="image/png" href="assets/questio-logo.png">
  <link rel="apple-touch-icon" href="assets/questio-logo.png">
  <meta name="theme-color" content="#0b1320">
  <meta name="description" content="Aktuelle News und Systemnachrichten aus Questio.">
</head>
<body>
  <canvas id="bg"></canvas>

  <a class="corner-logo-link" href="index.html" aria-label="Questio Home">
    <img class="corner-logo" src="assets/questio-logo.png" alt="Questio Logo">
  </a>

  <button id="menu-toggle" class="menu-toggle" aria-label="Menue oeffnen" aria-expanded="false" aria-controls="side-menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <aside id="side-menu" class="side-menu" aria-hidden="true">
    <div class="side-menu-inner">
      <h2>Menue</h2>
      <p class="muted">Schnellnavigation</p>
      <nav class="side-menu-nav">
        <a href="index.html">Home</a>
        <a href="progress.html">Fortschritt</a>
        <a href="news.html">News</a>
        <a href="spieler.html">Spieler</a>
        <a href="elternbereich.html">Elternbereich</a>
      </nav>
    </div>
  </aside>

  <div class="ui">
    <header class="site-header">
      <h1>Questio</h1>
      <p class="tagline">Der Weg des Sohnes.</p>
    </header>

    <main class="panel landing-panel">
      <section class="hero landing-title-only">
        <h2>News</h2>
        <p class="muted">Alle aktuellen Systemnachrichten auf einen Blick.</p>
      </section>

      <section class="status-panel">
        <h3>Aktuelle News</h3>
        <div id="news-list-latest" class="news-list-stack">
          <p class="muted">Lade News...</p>
        </div>
      </section>

      <section id="news-archive-section" class="status-panel" hidden>
        <button type="button" id="news-archive-toggle" class="collapsible-toggle" aria-expanded="false">
          <h3>Aeltere News</h3>
          <span class="collapsible-chevron" aria-hidden="true"></span>
        </button>
        <div id="news-archive-body" class="collapsible-body" hidden>
          <div id="news-list-archive" class="news-list-stack"></div>
        </div>
      </section>
    </main>

    <footer>
      <small>© Questio</small> - <a href="impressum.html">Impressum</a>
    </footer>
  </div>

  <script src="js/main.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/news.js"></script>
</body>
</html>
